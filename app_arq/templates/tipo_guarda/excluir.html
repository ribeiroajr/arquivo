{% extends 'base.html' %}
{% block title %}Confirmação de Exclusão{% endblock %}
{% block content %}


            <h3>Confirmação de Exclusão</h3>
            <p>Você está prestes a excluir o registro com ID: {{ tipo_guarda_ob.id }}</p>
            <p>Tem certeza que deseja prosseguir?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sim, excluir</button>
                <a href="{% url 'tipo_guarda_lista'%}" class="btn btn-secondary">Cancelar</a>
            </form>

{% endblock %}
