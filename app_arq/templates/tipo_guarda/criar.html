{% extends 'base.html' %}
{% block title %}Pagina Inicial{% endblock %}
{% block content %}

<form method="POST" enctype="multipart/form-data">
 
    <!-- Security token -->
    {% csrf_token %}
 
    <!-- Using the formset -->
    {{ form.as_p }}
     
    <input type="submit" class="btn btn-success" value="Salvar">
    <a href="{% url 'tipo_guarda_lista' %}" class="btn btn-danger">Cancelar</a>

</form>

{% endblock %}
