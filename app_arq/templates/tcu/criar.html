{% extends 'base.html' %}
{% block title %}Novo TCU{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 540px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Novo TCU</h5>
            <a href="{% url 'tcu_lista' %}" class="btn btn-sm btn-outline-light">← Voltar</a>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="form-simple-grid">{{ form.as_p }}</div>
                <div class="mt-3 d-flex gap-2">
                    <input type="submit" class="btn btn-success" value="Salvar">
                    <a href="{% url 'tcu_lista' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% include 'partials/form_style.html' %}
{% endblock %}
