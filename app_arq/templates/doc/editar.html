{% extends 'base.html' %}
{% block title %}Editar Registro{% endblock %}
{% block content %}

<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h3>Editar Registro</h3>
            <form data-related-url="{% url 'sgc_ajax_load_related_data' %}" enctype="multipart/form-data" method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                <a href="{% url 'doc_lista' %}" class="btn btn-danger">Cancelar</a>
            </form>
        </div>
    </div>
</div>
<script>
    $("#id_fk_codigo").change(function () {
        const codigoId = $(this).val();
        if (codigoId) {  // Verifica se o valor de codigoId não está vazio
            const url = $("#docsForm").attr("data-related-url");

            $.ajax({
                url: url,
                data: {
                    'codigo_id': codigoId
                },
                success: function (data) {
                    $("#id_doc_corrente_ano").val(data.doc_corrente_ano);
                    $("#id_doc_intermediario_ano").val(data.doc_intermediario_ano);
                    $("#id_doc_destinacao_final_ano").val(data.doc_destinacao_final_ano);
                    $("#id_doc_obs_ano").val(data.doc_obs_ano);
                    
                    // Verifica o valor de fk_tipo_guarda
                    if (data.fk_tipo_guarda === 1) {
                        // Se fk_tipo_guarda for 1, faz a soma
                        var idDocDataValue = parseInt($("#id_doc_data").val());
                        var docEliminacaoAnoValue = parseInt(data.doc_eliminacao_ano);
                        var soma = idDocDataValue + docEliminacaoAnoValue;
                        
                        // Preenche o campo id_doc_eliminacao_ano com a soma
                        $("#id_doc_eliminacao_ano").val(soma);
                        $("#id_doc_destinacao_final").val(data.tipo_guarda_descricao);
                        
                        // Calcula as somas adicionais
                        var somaCorrente = idDocDataValue + parseInt(data.doc_corrente_ano);
                        var somaIntermediaria = idDocDataValue + parseInt(data.doc_intermediario_ano);
                        var somaFinal = idDocDataValue + parseInt(data.doc_destinacao_final_ano);
                        var somaObs = idDocDataValue + parseInt(data.doc_obs_ano);
                        
                        // Preenche os campos com as somas adicionais
                        $("#id_doc_corrente_ano").val(somaCorrente);
                        $("#id_doc_intermediario_ano").val(somaIntermediaria);
                        $("#id_doc_destinacao_final_ano").val(somaFinal);
                        $("#id_doc_obs_ano").val(somaObs);
                    } else if (data.fk_tipo_guarda === 2) {
                        // Se fk_tipo_guarda for 2, substitui o valor de id_doc_eliminacao_ano pelo tipo_guarda_descricao
                        $("#id_doc_destinacao_final").val(data.tipo_guarda_descricao);
                        $("#id_doc_eliminacao_ano").val(0);
                    }
                }
            });
        } else {
            // Limpa os campos se o valor de codigoId estiver vazio
            $("#id_doc_corrente_ano").val('');
            $("#id_doc_intermediario_ano").val('');
            $("#id_doc_destinacao_final_ano").val('');
            $("#id_doc_obs_ano").val('');
            $("#id_doc_destinacao_final").val('');
        }
    });
</script>
{% endblock %}
